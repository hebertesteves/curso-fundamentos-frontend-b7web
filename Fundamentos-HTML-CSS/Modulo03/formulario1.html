<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <title>Document</title>
        <link rel="stylesheet" href="estilo.css">
    </head>

    <body>
        <h1>Página de Formulario</h1>

        <form method="POST" action="arquivo.php" enctype="multipart/form-data">
            <input type="hidden" name="country" value="BR" />

            <fieldset>
                <legend>Dados Pessoais</legend>
                <label>
                    Primeiro Nome:</br>
                    <input type="text" name="name" required minlength="2" maxlength="30">
                </label>

                <label>
                    Sobrenome:</br>
                    <input type="text" name="lastname">
                </label>

                <label>
                    Foto:</br>
                    <input type="file" name="photo" accept="image/*"/>
                    <!-- <input type="file" name="photo" accept="application/pdf"/> -->
                </label>
                            
            </fieldset>

            <fieldset>
                <legend>Dados Profissionais</legend>
                <label>
                    Nome da empresa:</br>
                    <input type="text" name="companyname">
                </label>

                <label>
                    Cargo na empresa:</br>
                    <input type="text" name="companyjobtitle">
                </label>
            </fieldset>

            <input type="submit" value="Cadastrar">
        </form>

    </body>

</html>
